<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Prava Bormi — Yo'l belgilari testi</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <!-- BOSHLASH EKRANI -->
  <section id="screen-start" class="screen active">
    <div class="plate">
      <span class="plate-region">UZ</span>
      <span class="plate-text">PRAVA&nbsp;BORMI</span>
    </div>
    <h1 class="title">Yo'l belgilari testi</h1>
    <p class="subtitle">Belgini ko'r, to'g'ri javobni tanla. <span id="q-count">10</span> ta savol.</p>

    <div class="lang-pick">
      <button class="lang-btn active" data-lang="uz_latin">O'zbekcha</button>
      <button class="lang-btn" data-lang="uz_cyrillic">Ўзбекча</button>
      <button class="lang-btn" data-lang="ru">Русский</button>
    </div>

    <button id="btn-start" class="btn-primary">Testni boshlash</button>
  </section>

  <!-- TEST EKRANI -->
  <section id="screen-quiz" class="screen">
    <header class="quiz-head">
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <span id="progress-text" class="progress-text">1 / 10</span>
      </div>
      <div id="timer" class="timer">00:00</div>
    </header>

    <div class="sign-frame">
      <img id="sign-img" class="sign-img" alt="Yo'l belgisi" src="">
    </div>

    <p id="question-text" class="question-text"></p>

    <div id="options" class="options"></div>

    <div id="feedback" class="feedback" hidden>
      <p id="feedback-result" class="feedback-result"></p>
      <p id="feedback-explain" class="feedback-explain"></p>
      <button id="btn-next" class="btn-primary">Keyingi</button>
    </div>
  </section>

  <!-- NATIJA EKRANI -->
  <section id="screen-result" class="screen">
    <div id="result-badge" class="result-badge">
      <span id="result-emoji" class="result-emoji">🎉</span>
    </div>
    <h2 id="result-title" class="result-title"></h2>
    <div class="score-big"><span id="score-num">0</span><span class="score-total">/<span id="score-max">10</span></span></div>
    <p id="result-detail" class="result-detail"></p>
    <div class="result-actions">
      <button id="btn-retry" class="btn-primary">Qaytadan</button>
      <button id="btn-send" class="btn-ghost">Natijani saqlash</button>
    </div>
  </section>

</div>
<script src="app.js"></script>
</body>
</html>
